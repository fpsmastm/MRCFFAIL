<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRC</title>
<style>
  :root {
    --accent: #e50914;
    --ag: rgba(229,9,20,0.35);
    --bg: #0a0a0a;
    --s1: #111;
    --s2: #181818;
    --bd: rgba(255,255,255,0.07);
    --tx: #f0f0f0;
    --mu: #555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--tx); min-height: 100vh; }

  #nav { display: flex; justify-content: center; align-items: center; gap: 4px; padding: 0 16px; height: 56px; background: #0d0d0d; border-bottom: 1px solid var(--bd); position: sticky; top: 0; z-index: 99; }
  .tb { font-size: 0.72em; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 7px 18px; background: none; border: 1px solid transparent; border-radius: 30px; color: var(--mu); cursor: pointer; transition: all 0.2s; }
  .tb:hover { color: #fff; background: rgba(255,255,255,0.05); }
  .tb.on { color: #fff; background: rgba(229,9,20,0.15); border-color: rgba(229,9,20,0.45); }

  .pg { display: none; }
  .pg.on { display: block; }

  /* HOME */
  #p-home { display: none; min-height: calc(100vh - 56px); flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; overflow: hidden; }
  #p-home.on { display: flex; }
  #p-home::before { content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, var(--ag) 0%, transparent 65%); top: 50%; left: 50%; transform: translate(-50%,-55%); animation: glow 4s ease-in-out infinite; pointer-events: none; }
  @keyframes glow { 0%,100%{opacity:.5;transform:translate(-50%,-55%) scale(1)} 50%{opacity:1;transform:translate(-50%,-55%) scale(1.1)} }
  #mrc { font-size: clamp(6em,18vw,13em); font-weight: 900; letter-spacing: .15em; line-height: 1; color: #fff; position: relative; z-index: 1; animation: up .7s cubic-bezier(.16,1,.3,1) both; }
  #mrc span { color: var(--accent); }
  #bar { width: 50px; height: 3px; background: var(--accent); margin: 20px auto; box-shadow: 0 0 10px var(--accent); animation: up .7s .1s cubic-bezier(.16,1,.3,1) both; }
  #clk { font-size: clamp(1.3em,4vw,2em); font-weight: 200; letter-spacing: 5px; color: rgba(255,255,255,.4); font-variant-numeric: tabular-nums; animation: up .7s .2s cubic-bezier(.16,1,.3,1) both; position: relative; z-index: 1; }
  #sub { font-size: .65em; letter-spacing: 4px; text-transform: uppercase; color: var(--mu); margin-top: 32px; animation: up .7s .3s cubic-bezier(.16,1,.3,1) both; }
  @keyframes up { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

  /* TOOLS */
  #p-tools { display: none; min-height: calc(100vh - 56px); align-items: center; justify-content: center; }
  #p-tools.on { display: flex; }
  .wcard { border: 1px solid var(--bd); border-radius: 18px; padding: 56px 64px; background: var(--s1); text-align: center; position: relative; overflow: hidden; animation: up .5s cubic-bezier(.16,1,.3,1) both; }
  .wcard::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 50% 0%, rgba(229,9,20,.06) 0%, transparent 55%); pointer-events: none; }
  .wcard .ico { font-size: 2.8em; display: block; margin-bottom: 16px; }
  .wcard h2 { font-size: 2.2em; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 8px; }
  .wcard p { color: var(--mu); font-size: .9em; }
  .wcard p b { color: var(--accent); font-weight: 600; }
  .badge { display: inline-block; margin-top: 20px; padding: 5px 16px; border-radius: 30px; border: 1px solid rgba(229,9,20,.4); background: rgba(229,9,20,.08); font-size: .68em; letter-spacing: 2.5px; text-transform: uppercase; color: var(--accent); }

  /* AI */
  #p-ai { display: none; flex-direction: column; height: calc(100vh - 56px); overflow: hidden; }
  #p-ai.on { display: flex; }
  #ai-header { padding: 12px 20px; border-bottom: 1px solid var(--bd); background: #0d0d0d; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  #ai-header h2 { font-size: 1em; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
  #ai-header h2 span { color: var(--accent); }
  #ai-mdl { margin-left: auto; background: var(--s2); color: var(--tx); border: 1px solid var(--bd); border-radius: 8px; padding: 6px 10px; font-size: 0.8em; outline: none; cursor: pointer; }
  #ai-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  #ai-msgs::-webkit-scrollbar { width: 4px; }
  #ai-msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  .ai-empty { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 2.5em; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; color: rgba(255,255,255,0.06); pointer-events: none; }
  .ai-empty span { color: rgba(229,9,20,0.2); }
  .ai-bubble { display: flex; gap: 10px; max-width: 780px; width: 100%; margin: 0 auto; animation: up 0.3s ease both; }
  .ai-av { width: 30px; height: 30px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--bd); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.85em; }
  .ai-txt { flex: 1; background: rgba(20,20,20,0.9); border: 1px solid var(--bd); border-radius: 12px; padding: 12px 14px; font-size: 0.88em; line-height: 1.65; color: var(--tx); white-space: pre-wrap; word-break: break-word; }
  .ai-txt.thinking { color: var(--mu); font-style: italic; }
  #ai-footer { padding: 12px 16px 16px; background: rgba(10,10,10,0.95); border-top: 1px solid var(--bd); flex-shrink: 0; }
  #ai-box { max-width: 780px; margin: 0 auto; background: var(--s2); border: 1px solid var(--bd); border-radius: 14px; padding: 8px; display: flex; align-items: flex-end; gap: 8px; transition: border-color 0.2s; }
  #ai-box:focus-within { border-color: rgba(229,9,20,0.4); }
  #ai-inp { flex: 1; background: transparent; border: none; color: var(--tx); font-family: inherit; font-size: 0.88em; resize: none; outline: none; min-height: 22px; max-height: 160px; padding: 4px 6px; line-height: 1.5; }
  #ai-inp::placeholder { color: #333; }
  #ai-send { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s; font-size: 0.85em; }
  #ai-send:disabled { opacity: 0.25; cursor: not-allowed; }
  #ai-send:hover:not(:disabled) { opacity: 0.85; }

  /* MOVIES */
  #p-movies { padding: 28px 20px 60px; }
  #srchwrap { max-width: 560px; margin: 0 auto 28px; position: relative; }
  #srchwrap::before { content: '🔍'; position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: .85em; pointer-events: none; }
  #srch { width: 100%; padding: 14px 18px 14px 44px; font-size: .9em; border-radius: 40px; border: 1px solid var(--bd); background: var(--s2); color: var(--tx); outline: none; transition: border-color .2s,box-shadow .2s; }
  #srch::placeholder { color: var(--mu); }
  #srch:focus { border-color: rgba(229,9,20,.5); box-shadow: 0 0 0 3px rgba(229,9,20,.1); }
  #spin-wrap { text-align: center; padding: 50px; display: none; }
  .spin { display: inline-block; width: 30px; height: 30px; border: 2px solid var(--bd); border-top-color: var(--accent); border-radius: 50%; animation: rot .7s linear infinite; }
  @keyframes rot { to{transform:rotate(360deg)} }
  #msg { text-align: center; padding: 16px; font-size: .88em; color: #e55; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(145px,1fr)); gap: 14px; max-width: 1480px; margin: 0 auto; }
  .card { cursor: pointer; border-radius: 9px; overflow: hidden; background: var(--s1); border: 1px solid var(--bd); transition: transform .22s cubic-bezier(.16,1,.3,1),box-shadow .22s; animation: up .45s cubic-bezier(.16,1,.3,1) both; }
  .card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 18px 36px rgba(0,0,0,.65),0 0 0 1px rgba(229,9,20,.25); }
  .thumb { position: relative; aspect-ratio: 2/3; overflow: hidden; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .35s; }
  .card:hover .thumb img { transform: scale(1.05); }
  .ov { position: absolute; inset: 0; background: linear-gradient(to top,rgba(0,0,0,.82) 0%,transparent 48%); opacity: 0; transition: opacity .22s; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 14px; }
  .card:hover .ov { opacity: 1; }
  .pbtn { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: .9em; }
  .info { padding: 9px 9px 11px; }
  .ttl { font-size: .78em; font-weight: 500; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .typ { font-size: .62em; letter-spacing: 1.5px; text-transform: uppercase; color: var(--mu); margin-top: 2px; }
  #more { display: block; margin: 44px auto 0; padding: 13px 36px; font-size: .82em; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; background: transparent; color: #fff; border: 1px solid rgba(255,255,255,.14); border-radius: 40px; cursor: pointer; transition: all .22s; }
  #more:hover { background: var(--accent); border-color: var(--accent); }

  /* SETTINGS */
  #p-settings { padding: 44px 20px 70px; max-width: 700px; margin: 0 auto; }
  #p-settings h2 { font-size: 2em; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 6px; }
  #p-settings .sub { color: var(--mu); font-size: .85em; margin-bottom: 32px; }
  .slbl { font-size: .65em; letter-spacing: 3px; text-transform: uppercase; color: var(--mu); margin-bottom: 14px; padding-bottom: 9px; border-bottom: 1px solid var(--bd); }
  .tgrid { display: grid; grid-template-columns: repeat(auto-fill,minmax(120px,1fr)); gap: 10px; }
  .sw { cursor: pointer; border-radius: 12px; border: 1px solid var(--bd); padding: 16px 12px; background: var(--s1); transition: all .2s; position: relative; animation: up .45s cubic-bezier(.16,1,.3,1) both; }
  .sw:hover { transform: translateY(-2px); border-color: rgba(255,255,255,.14); }
  .sw.on { border-color: var(--sc,var(--accent)); }
  .dot { width: 32px; height: 32px; border-radius: 50%; margin-bottom: 10px; }
  .snm { font-size: .75em; font-weight: 500; color: #bbb; display: block; }
  .ck { position: absolute; top: 9px; right: 9px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; opacity: 0; transition: opacity .2s; }
  .sw.on .ck { opacity: 1; }
</style>
</head>
<body>

<nav id="nav">
  <button class="tb on" data-t="home">Home</button>
  <button class="tb" data-t="tools">Tools</button>
  <button class="tb" data-t="ai">AI</button>
  <button class="tb" data-t="movies">Movies</button>
  <button class="tb" data-t="settings">Settings</button>
</nav>

<!-- HOME -->
<div id="p-home" class="pg on">
  <div id="mrc">M<span>R</span>C</div>
  <div id="bar"></div>
  <div id="clk">00:00:00</div>
  <div id="sub">Media Resource Center</div>
</div>

<!-- TOOLS -->
<div id="p-tools" class="pg">
  <div class="wcard">
    <span class="ico">🛠</span>
    <h2>Tools</h2>
    <p>Work in progress by <b>Mason</b></p>
    <div class="badge">Coming Soon</div>
  </div>
</div>

<!-- AI -->
<div id="p-ai" class="pg">
  <div id="ai-header">
    <h2>MRC <span>AI</span></h2>
    <select id="ai-mdl">
      <option value="openai">GPT-4o</option>
      <option value="mistral">Mistral</option>
      <option value="llama">Llama</option>
      <option value="gemini">Gemini</option>
      <option value="claude-hybridspace">Claude</option>
    </select>
  </div>
  <div id="ai-msgs">
    <div class="ai-empty">MRC <span>AI</span></div>
  </div>
  <div id="ai-footer">
    <div id="ai-box">
      <textarea id="ai-inp" placeholder="Ask MRC AI anything..." rows="1"></textarea>
      <button id="ai-send" disabled>&#8593;</button>
    </div>
  </div>
</div>

<!-- MOVIES -->
<div id="p-movies" class="pg">
  <div id="srchwrap"><input id="srch" type="text" placeholder="Search movies or TV shows..."></div>
  <div id="spin-wrap"><div class="spin"></div></div>
  <div id="msg"></div>
  <div id="grid"></div>
  <button id="more" style="display:none">Load More</button>
</div>

<!-- SETTINGS -->
<div id="p-settings" class="pg">
  <h2>Settings</h2>
  <p class="sub">Personalize your MRC experience</p>
  <div class="slbl">Accent Theme</div>
  <div class="tgrid">
    <div class="sw on" data-c="#e50914" style="--sc:#e50914" onclick="setTheme(this)"><div class="dot" style="background:#e50914"></div><span class="snm">Netflix Red</span><div class="ck" style="background:#e50914;color:#fff">✓</div></div>
    <div class="sw" data-c="#0ea5e9" style="--sc:#0ea5e9" onclick="setTheme(this)"><div class="dot" style="background:#0ea5e9"></div><span class="snm">Sky Blue</span><div class="ck" style="background:#0ea5e9;color:#fff">✓</div></div>
    <div class="sw" data-c="#a855f7" style="--sc:#a855f7" onclick="setTheme(this)"><div class="dot" style="background:#a855f7"></div><span class="snm">Violet</span><div class="ck" style="background:#a855f7;color:#fff">✓</div></div>
    <div class="sw" data-c="#10b981" style="--sc:#10b981" onclick="setTheme(this)"><div class="dot" style="background:#10b981"></div><span class="snm">Emerald</span><div class="ck" style="background:#10b981;color:#fff">✓</div></div>
    <div class="sw" data-c="#f59e0b" style="--sc:#f59e0b" onclick="setTheme(this)"><div class="dot" style="background:#f59e0b"></div><span class="snm">Amber</span><div class="ck" style="background:#f59e0b;color:#000">✓</div></div>
    <div class="sw" data-c="#ec4899" style="--sc:#ec4899" onclick="setTheme(this)"><div class="dot" style="background:#ec4899"></div><span class="snm">Hot Pink</span><div class="ck" style="background:#ec4899;color:#fff">✓</div></div>
    <div class="sw" data-c="#f97316" style="--sc:#f97316" onclick="setTheme(this)"><div class="dot" style="background:#f97316"></div><span class="snm">Orange</span><div class="ck" style="background:#f97316;color:#fff">✓</div></div>
    <div class="sw" data-c="#e2e8f0" style="--sc:#e2e8f0" onclick="setTheme(this)"><div class="dot" style="background:#e2e8f0"></div><span class="snm">White Ice</span><div class="ck" style="background:#e2e8f0;color:#000">✓</div></div>
  </div>
</div>

<script>
/* ── TABS ── */
var APIKEY = '733222e055f83c3e0a83aa99e7037576';
var BASE   = 'https://api.themoviedb.org/3';
var pg = 1, q = '', loaded = false;
var grid = document.getElementById('grid');
var spinWrap = document.getElementById('spin-wrap');
var msg  = document.getElementById('msg');
var more = document.getElementById('more');
var srch = document.getElementById('srch');

document.querySelectorAll('.tb').forEach(function(b) {
  b.addEventListener('click', function() {
    var t = this.dataset.t;
    document.querySelectorAll('.tb').forEach(function(x){ x.classList.remove('on'); });
    document.querySelectorAll('.pg').forEach(function(x){ x.classList.remove('on'); });
    this.classList.add('on');
    document.getElementById('p-'+t).classList.add('on');
    if (t === 'movies' && !loaded) { loaded = true; go(1,''); }
  });
});

/* ── CLOCK ── */
function tick() {
  var n = new Date();
  document.getElementById('clk').textContent =
    String(n.getHours()).padStart(2,'0')+':'+
    String(n.getMinutes()).padStart(2,'0')+':'+
    String(n.getSeconds()).padStart(2,'0');
}
tick(); setInterval(tick, 1000);

/* ── THEME ── */
function hr(h,a) {
  var c=h.replace('#','');
  if(c.length!==6) return 'rgba(229,9,20,'+a+')';
  return 'rgba('+parseInt(c.slice(0,2),16)+','+parseInt(c.slice(2,4),16)+','+parseInt(c.slice(4,6),16)+','+a+')';
}
function setTheme(el) {
  var c = el.dataset.c;
  document.documentElement.style.setProperty('--accent', c);
  document.documentElement.style.setProperty('--ag', hr(c, 0.35));
  document.querySelectorAll('.sw').forEach(function(s){ s.classList.remove('on'); });
  el.classList.add('on');
  localStorage.setItem('mrc-t', c);
}
(function(){
  var s = localStorage.getItem('mrc-t'); if (!s) return;
  document.documentElement.style.setProperty('--accent', s);
  document.documentElement.style.setProperty('--ag', hr(s, 0.35));
  document.querySelectorAll('.sw').forEach(function(el){ el.classList.toggle('on', el.dataset.c===s); });
})();

/* ── AI CHAT ── */
var aiHistory = [];
var aiMsgs    = document.getElementById('ai-msgs');
var aiInp     = document.getElementById('ai-inp');
var aiSend    = document.getElementById('ai-send');
var aiMdl     = document.getElementById('ai-mdl');
var aiTyping  = false;

aiInp.addEventListener('input', function() {
  aiSend.disabled = !this.value.trim() || aiTyping;
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});

aiInp.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); aiDoSend(); }
});

aiSend.addEventListener('click', aiDoSend);

function aiAddBubble(role, text, id) {
  var empty = aiMsgs.querySelector('.ai-empty');
  if (empty) empty.remove();
  var d = document.createElement('div');
  d.className = 'ai-bubble';
  if (id) d.id = id;
  var icon = role === 'ai' ? '🤖' : '👤';
  var txt = document.createElement('div');
  txt.className = 'ai-txt' + (text === '...' ? ' thinking' : '');
  txt.textContent = text;
  d.innerHTML = '<div class="ai-av">' + icon + '</div>';
  d.appendChild(txt);
  aiMsgs.appendChild(d);
  aiMsgs.scrollTop = aiMsgs.scrollHeight;
  return txt; // return the text node so we can update it
}

function aiDoSend() {
  var text = aiInp.value.trim();
  if (!text || aiTyping) return;
  aiTyping = true;
  aiSend.disabled = true;
  aiInp.value = '';
  aiInp.style.height = 'auto';

  aiHistory.push({ role: 'user', content: text });
  aiAddBubble('user', text);

  var thinkTxt = aiAddBubble('ai', '...', 'ai-thinking');
  thinkTxt.classList.add('thinking');

  var model = aiMdl.value;
  var full = '';

  fetch('https://text.pollinations.ai/openai', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      
      
      
    },
    body: JSON.stringify({
      model: model,
      stream: true,
      messages: [
        { role: 'system', content: 'You are MRC AI, a helpful assistant built into the MRC platform. Be concise and helpful.' }
      ].concat(aiHistory.slice(-14))
    })
  })
  .then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    thinkTxt.textContent = '';
    thinkTxt.classList.remove('thinking');
    var reader = res.body.getReader();
    var dec = new TextDecoder();

    function pump() {
      return reader.read().then(function(result) {
        if (result.done) {
          aiHistory.push({ role: 'assistant', content: full });
          aiTyping = false;
          aiSend.disabled = !aiInp.value.trim();
          return;
        }
        var lines = dec.decode(result.value, { stream: true }).split('\n');
        lines.forEach(function(line) {
          if (line.startsWith('data: ') && line !== 'data: [DONE]') {
            try {
              var chunk = JSON.parse(line.slice(6));
              var delta = chunk.choices[0].delta.content;
              if (delta) {
                full += delta;
                thinkTxt.textContent = full;
                aiMsgs.scrollTop = aiMsgs.scrollHeight;
              }
            } catch(e) {}
          }
        });
        return pump();
      });
    }
    return pump();
  })
  .catch(function(e) {
    thinkTxt.classList.remove('thinking');
    thinkTxt.textContent = 'Error: ' + e.message;
    aiTyping = false;
    aiSend.disabled = !aiInp.value.trim();
  });
}

/* ── MOVIE POPUP ── */
function openPlayer(url) {
  var w = window.open('about:blank','_blank');
  if (!w) { alert('Allow popups for this site.'); return; }
  w.document.open();
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Google</title>'
    +'<link rel="icon" href="https://www.google.com/favicon.ico">'
    +'<style>*{margin:0;padding:0}html,body{width:100%;height:100%;background:#000;overflow:hidden}'
    +'iframe{position:fixed;top:0;left:0;width:100%;height:100%;border:none}</style>'
    +'</head><body><iframe src="'+url+'" allowfullscreen allow="autoplay;fullscreen"></iframe></body></html>');
  w.document.close(); w.focus();
}

/* ── FETCH MOVIES ── */
function tmdb(path, params) {
  var sep = path.indexOf('?') > -1 ? '&' : '?';
  var url = BASE + path + sep + 'api_key=' + APIKEY + (params ? '&' + params : '');
  return fetch(url).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  });
}

async function go(p, query) {
  if (p === 1) grid.innerHTML = '';
  spinWrap.style.display = 'block';
  more.style.display = 'none';
  msg.textContent = '';
  try {
    var items = [];
    if (query) {
      var d = await tmdb('/search/multi', 'query='+encodeURIComponent(query)+'&page='+p+'&include_adult=false');
      items = d.results || [];
    } else if (p === 1) {
      var d1 = await tmdb('/movie/popular', 'language=en-US&page=1');
      var d2 = await tmdb('/tv/popular', 'language=en-US&page=1');
      items = (d1.results||[]).concat(d2.results||[]).sort(function(){ return Math.random()-0.5; });
      pg = 2;
    } else {
      var type = p % 2 === 0 ? 'movie' : 'tv';
      var d3 = await tmdb('/'+type+'/popular', 'language=en-US&page='+Math.ceil(p/2));
      items = d3.results || [];
    }
    spinWrap.style.display = 'none';
    draw(items);
    if (grid.children.length === 0) msg.textContent = 'No results found.';
    else if (!query) more.style.display = 'block';
  } catch(e) {
    spinWrap.style.display = 'none';
    msg.textContent = 'Error: ' + e.message;
  }
}

function draw(items) {
  items.forEach(function(item, i) {
    var isM = item.media_type==='movie' || (!item.media_type && !!item.title);
    var ttl  = (item.title||item.name||'Untitled').replace(/</g,'&lt;');
    var img  = item.poster_path ? 'https://image.tmdb.org/t/p/w342'+item.poster_path : 'https://via.placeholder.com/300x450/111/333?text=No+Poster';
    var url  = isM ? 'https://vidsrc.xyz/embed/movie/'+item.id : 'https://vidsrc.xyz/embed/tv/'+item.id+'/1/1';
    var c = document.createElement('div');
    c.className = 'card';
    c.style.animationDelay = (i*0.03)+'s';
    c.innerHTML = '<div class="thumb"><img src="'+img+'" alt="'+ttl+'" loading="lazy"><div class="ov"><div class="pbtn">&#9654;</div></div></div><div class="info"><div class="ttl">'+ttl+'</div><div class="typ">'+(isM?'Movie':'TV Show')+'</div></div>';
    (function(u){ c.addEventListener('click', function(){ openPlayer(u); }); })(url);
    grid.appendChild(c);
  });
}

more.addEventListener('click', function(){ go(pg++, q); });
var st;
srch.addEventListener('input', function(){
  q = this.value.trim();
  clearTimeout(st);
  st = setTimeout(function(){
    pg = 1;
    if (q.length > 2) go(1, q);
    else if (q === '') go(1, '');
  }, 350);
});
</script>
</body>
</html>
